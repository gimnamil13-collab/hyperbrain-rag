services:
  - type: web
    name: hyperbrain-rag-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONPATH
        value: .
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: CHROMA_DIR
        value: /tmp/hyperbrain_rag/chroma_db
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
